name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests (incl. retrieval quality gates)
        run: pytest -q
      - name: Retrieval benchmark
        run: |
          python scripts/generate_data.py --out data
          python -m ledger_auditor.cli --backend tfidf eval --mode retrieval --k 3
